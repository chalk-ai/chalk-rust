syntax = "proto3";

package chalk.expression.v1;

import "chalk/arrow/v1/arrow.proto";

message Identifier {
  string name = 1;
}

message TypedIdentifier {
  string name = 1;
  optional chalk.arrow.v1.ArrowType type = 2;
}

// A field-access expression, like `arr.length`.
message ExprGetAttribute {
  LogicalExprNode parent = 1;
  Identifier attribute = 2;
}

// A key-lookup expression, like `hash[name]` or `matrix[r, c]`.
message ExprGetSubscript {
  LogicalExprNode parent = 1;
  repeated LogicalExprNode subscript = 2;
}

// A function call, like `abs(x)` or `arr.indexof(6)` or `a + b`.
//
// In function calls, like `abs(x)`, the `func` will be an identifier with the
// specified name.
//
// In method calls, like `arr.indexof(6)`, the `func` will be a get-attribute
// expression.
//
// In operator expressions, the `func` will be an identifier with the operator
// as its name e.g. `"+"`.
message ExprCall {
  LogicalExprNode func = 1;
  repeated LogicalExprNode args = 2;
  map<string, LogicalExprNode> kwargs = 3;
  optional string repr_override = 4;
}

// A literal expression.
message ExprLiteral {
  chalk.arrow.v1.ScalarValue value = 1;

  // All Python literal values are encoded as arrow scalar values.
  // - If this bool is `False`, then the decoded value was originally a plain
  // Python value.
  // - If this bool is `True`, then the decoded value should be a
  // `pyarrow.Scalar` value.
  bool is_arrow_scalar_object = 2;
}

message LogicalExprNode {
  // Each expression has a form, which is one of the following.
  //
  // These forms are deliberately purely syntactic - additional semantic
  // information, like types, are dependent on the feature graph, which may
  // therefore be out-of-date when decoding an expression message.
  //
  // Consumers must always perform additional parsing and validation, so
  // semantic information should not be stored in the proto message itself.
  oneof expr_form {
    Identifier identifier = 35;
    ExprGetAttribute get_attribute = 36;
    ExprGetSubscript get_subscript = 37;
    ExprCall call = 38;
    ExprLiteral literal_value = 39;
    TypedIdentifier typed_identifier = 41;
  }
  string expr_id = 40; // The memory ID of this node. Nodes with equal id share are *identical*, sharing any nondeterminism and mutations.

  // All of these expression forms are deprecated.
  // A simpler syntactic representation is used now.
  oneof expr_type {
    // column references
    Column column = 1 [deprecated = true];

    // alias
    AliasNode alias = 2 [deprecated = true];

    chalk.arrow.v1.ScalarValue literal = 3 [deprecated = true];

    // binary expressions
    BinaryExprNode binary_expr = 4 [deprecated = true];

    // aggregate expressions
    AggregateExprNode aggregate_expr = 5 [deprecated = true];

    // null checks
    IsNull is_null_expr = 6 [deprecated = true];
    IsNotNull is_not_null_expr = 7 [deprecated = true];
    Not not_expr = 8 [deprecated = true];

    BetweenNode between = 9 [deprecated = true];
    CaseNode case = 10 [deprecated = true];
    CastNode cast = 11 [deprecated = true];
    SortExprNode sort = 12 [deprecated = true];
    NegativeNode negative = 13 [deprecated = true];
    InListNode in_list = 14 [deprecated = true];
    Wildcard wildcard = 15 [deprecated = true];
    ScalarFunctionNode scalar_function = 16 [deprecated = true];
    TryCastNode try_cast = 17 [deprecated = true];

    // window expressions
    WindowExprNode window_expr = 18 [deprecated = true];

    // AggregateUDF expressions
    AggregateUDFExprNode aggregate_udf_expr = 19 [deprecated = true];

    // Scalar UDF expressions
    ScalarUDFExprNode scalar_udf_expr = 20 [deprecated = true];

    GetIndexedField get_indexed_field = 21 [deprecated = true];

    GroupingSetNode grouping_set = 22 [deprecated = true];

    CubeNode cube = 23 [deprecated = true];

    RollupNode rollup = 24 [deprecated = true];

    IsTrue is_true = 25 [deprecated = true];
    IsFalse is_false = 26 [deprecated = true];
    IsUnknown is_unknown = 27 [deprecated = true];
    IsNotTrue is_not_true = 28 [deprecated = true];
    IsNotFalse is_not_false = 29 [deprecated = true];
    IsNotUnknown is_not_unknown = 30 [deprecated = true];
    LikeNode like = 31 [deprecated = true];
    ILikeNode ilike = 32 [deprecated = true];
    SimilarToNode similar_to = 33 [deprecated = true];

    PlaceholderNode placeholder = 34 [deprecated = true];
  }
}

message ColumnRelation {
  string relation = 1;
}

message Column {
  string name = 1;
  ColumnRelation relation = 2;
}

message Wildcard {
  optional string qualifier = 1;
}

message PlaceholderNode {
  string id = 1;
  chalk.arrow.v1.ArrowType data_type = 2;
}

message LogicalExprList {
  repeated LogicalExprNode expr = 1;
}

message GroupingSetNode {
  repeated LogicalExprList expr = 1;
}

message CubeNode {
  repeated LogicalExprNode expr = 1;
}

message RollupNode {
  repeated LogicalExprNode expr = 1;
}

message NamedStructField {
  chalk.arrow.v1.ScalarValue name = 1;
}

message ListIndex {
  LogicalExprNode key = 1;
}

message ListRange {
  LogicalExprNode start = 1;
  LogicalExprNode stop = 2;
}

message GetIndexedField {
  LogicalExprNode expr = 1;
  oneof field {
    NamedStructField named_struct_field = 2;
    ListIndex list_index = 3;
    ListRange list_range = 4;
  }
}

message IsNull {
  LogicalExprNode expr = 1;
}

message IsNotNull {
  LogicalExprNode expr = 1;
}

message IsTrue {
  LogicalExprNode expr = 1;
}

message IsFalse {
  LogicalExprNode expr = 1;
}

message IsUnknown {
  LogicalExprNode expr = 1;
}

message IsNotTrue {
  LogicalExprNode expr = 1;
}

message IsNotFalse {
  LogicalExprNode expr = 1;
}

message IsNotUnknown {
  LogicalExprNode expr = 1;
}

message Not {
  LogicalExprNode expr = 1;
}

message AliasNode {
  LogicalExprNode expr = 1;
  string alias = 2;
  repeated OwnedTableReference relation = 3;
}

message BareTableReference {
  string table = 1;
}

message PartialTableReference {
  string schema = 1;
  string table = 2;
}

message FullTableReference {
  string catalog = 1;
  string schema = 2;
  string table = 3;
}

message OwnedTableReference {
  oneof table_reference_enum {
    BareTableReference bare = 1;
    PartialTableReference partial = 2;
    FullTableReference full = 3;
  }
}

message BinaryExprNode {
  // Represents the operands from the left inner most expression
  // to the right outer most expression where each of them are chained
  // with the operator 'op'.
  repeated LogicalExprNode operands = 1;
  string op = 3;
}

message NegativeNode {
  LogicalExprNode expr = 1;
}

message InListNode {
  LogicalExprNode expr = 1;
  repeated LogicalExprNode list = 2;
  bool negated = 3;
}

