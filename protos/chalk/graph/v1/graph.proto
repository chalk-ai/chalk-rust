syntax = "proto3";

package chalk.graph.v1;

import "chalk/arrow/v1/arrow.proto";
import "chalk/dataframe/v1/dataframe.proto";
import "chalk/expression/v1/expression.proto";
import "chalk/graph/v1/sources.proto";
import "chalk/graph/v2/sources.proto";
import "chalk/lsp/v1/lsp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message Graph {
  repeated FeatureSet feature_sets = 1;
  repeated Resolver resolvers = 2;
  repeated StreamResolver stream_resolvers = 3;
  repeated SinkResolver sink_resolvers = 4;
  // database_sources is deprecated; see database_sources_v2
  repeated DatabaseSource database_sources = 5 [deprecated = true];
  // stream_sources is deprecated; see stream_sources_v2
  repeated StreamSource stream_sources = 6 [deprecated = true];
  repeated NamedQuery named_queries = 7;
  repeated chalk.graph.v2.DatabaseSource database_sources_v2 = 8;
  repeated chalk.graph.v2.DatabaseSourceGroup database_source_groups = 10;
  repeated chalk.graph.v2.StreamSource stream_sources_v2 = 9;
  repeated ModelReference model_references = 11;
  repeated OnlineStoreConfig online_store_configs = 12;
}

message OverlayGraph {
  repeated FeatureSet feature_sets = 1;
  // New feature fields to be added to existing feature classes
  repeated FeatureType feature_fields = 2;
  repeated Resolver resolvers = 3;
  repeated SQLResolverInfo generated_sql_resolvers = 4;
}

message ModelReference {
  string name = 1;
  oneof identifier {
    // The version of the model is an integer, e.g. 1, 2, 3, etc.
    uint64 version = 2;
    // The alias for the model version, e.g. "latest", "staging", etc.
    string alias = 3;
    // Asof when to pull the model with a given name
    google.protobuf.Timestamp as_of = 4;
  }
  optional SourceFileReference source_file_reference = 5;
}

message NamedQuery {
  string name = 1;
  optional string query_version = 2;
  repeated string input = 3;
  repeated string output = 4;
  repeated string tags = 5;
  optional string description = 6;
  optional string owner = 7;
  map<string, string> meta = 8;
  map<string, google.protobuf.Duration> staleness = 9;
  map<string, string> planner_options = 10;
  string file_name = 11;
  // required
  optional string deployment_id = 12;
  optional SourceFileReference source_file_reference = 13;
  repeated string additional_logged_features = 14;
  optional bool valid_plan_not_required = 15;
}

message FeatureSet {
  string name = 1;
  repeated FeatureType features = 2;
  google.protobuf.Duration max_staleness_duration = 3;
  bool is_singleton = 4;
  repeated string tags = 5;
  optional string owner = 6;
  // The docstring of the class on which the features are defined.
  optional string doc = 7;
  optional bool etl_offline_to_online = 8;
  optional string class_path = 9;
  optional string online_store_config = 10;
}

message FeatureType {
  oneof type {
    ScalarFeatureType scalar = 1;
    HasOneFeatureType has_one = 2;
    HasManyFeatureType has_many = 3;
    FeatureTimeFeatureType feature_time = 4;
    WindowedFeatureType windowed = 5;
    GroupByFeatureType group_by = 6;
  }
}

message FeatureReference {
  string name = 1;
  string namespace = 2;
  repeated FeatureReference path = 3;
  DataFrameType df = 4;
}

message DataFrameType {
  string root_namespace = 1;
  repeated FeatureReference required_columns = 2;
  repeated FeatureReference optional_columns = 3;
  chalk.expression.v1.LogicalExprNode filter = 4;
  optional uint64 limit = 5;
}

message GroupByFeatureType {
  string name = 1;
  string namespace = 2;
  bool is_nullable = 3;
  optional uint64 internal_version = 4;
  chalk.arrow.v1.ArrowType arrow_type = 5;
  WindowAggregation aggregation = 6;
  repeated google.protobuf.Duration window_durations = 7;
  chalk.expression.v1.LogicalExprNode expression = 8;
  chalk.arrow.v1.ScalarValue default_value = 9;
  repeated string tags = 10;
  optional string description = 11;
  optional string owner = 12;
  repeated FeatureValidation validations = 13;
  string attribute_name = 14;
  string unversioned_attribute_name = 15;
}

message ScalarFeatureType {
  string name = 1;
  string namespace = 2;
  bool is_autogenerated = 3;
  bool no_display = 4;
  bool is_primary = 5;
  bool is_nullable = 6;
  optional uint64 internal_version = 7;
  // This represents whatever arg the user passed into the `feature()` call.
  // If both set, this should take precedence over the value in `FeatureSet`.
  // If unset here, the value in `FeatureSet` should be used.
  google.protobuf.Duration max_staleness_duration = 8;
  google.protobuf.Duration offline_ttl_duration = 10;
  chalk.arrow.v1.ArrowType arrow_type = 11;
  VersionInfo version = 12;
  WindowInfo window_info = 13;
  chalk.arrow.v1.ScalarValue default_value = 14;
  repeated string tags = 15;
  optional string description = 16;
  optional string owner = 17;
  chalk.expression.v1.LogicalExprNode expression = 18;
  repeated FeatureValidation validations = 19;
  FeatureReference last_for = 20;
  // This represents whatever arg the user passed into the `feature()` call.
  // If both set, this should take precedence over the value in `FeatureSet`.
  // If unset here, the value in `FeatureSet` should be used.
  optional bool etl_offline_to_online = 21;
  bool is_distance_pseudofeature = 22;
  string attribute_name = 23;

  // Whether the user marked the feature as deprecated.
  bool is_deprecated = 24;
  CacheStrategy cache_strategy = 25;
  optional bool store_online = 26; // optional because proto default is false, but chalk defaults to true
  optional bool store_offline = 27; // optional because proto default is false, but chalk defaults to true
  string unversioned_attribute_name = 28;
  optional FeatureRichTypeInfo rich_type_info = 29;
  optional lsp.v1.Location expression_definition_location = 30;
  optional chalk.expression.v1.LogicalExprNode offline_expression = 31;
}

message HasOneFeatureType {
  string name = 1;
  string namespace = 2;
  string foreign_namespace = 3;
  chalk.expression.v1.LogicalExprNode join = 4;
  bool is_nullable = 5;
  bool is_autogenerated = 6;
  repeated string tags = 7;
  optional string description = 8;
  optional string owner = 9;
  string attribute_name = 10;
  string unversioned_attribute_name = 11;
}

message HasManyFeatureType {
  string name = 1;
  string namespace = 2;
  string foreign_namespace = 3;
  chalk.expression.v1.LogicalExprNode join = 4;
  bool is_autogenerated = 5;
  google.protobuf.Duration max_staleness_duration = 6;
  repeated string tags = 7;
  optional string description = 8;
  optional string owner = 9;
  string attribute_name = 10;
  string unversioned_attribute_name = 11;
  optional uint64 online_store_max_items = 12;
}

message FeatureTimeFeatureType {
  string name = 1;
  string namespace = 2;
  bool is_autogenerated = 3;
  repeated string tags = 4;
  optional string description = 5;
  optional string owner = 6;
  string attribute_name = 7;
}

message WindowedFeatureType {
  string name = 1;
  string namespace = 2;
  bool is_autogenerated = 3;
  repeated google.protobuf.Duration window_durations = 4;
  string attribute_name = 5;
  string unversioned_attribute_name = 6;
}

message WindowAggregation {
  string namespace = 1;
  repeated FeatureReference group_by = 2;
  google.protobuf.Duration bucket_duration = 3;
  string aggregation = 4;
  optional FeatureReference aggregate_on = 5;
  chalk.arrow.v1.ArrowType arrow_type = 6;
  repeated chalk.expression.v1.LogicalExprNode filters = 7;

  // The resolver to use for back-filling the materialized aggregate.
  // If not provided, the data will be back filled using the resolver
  // that would run for an offline query.
  optional string backfill_resolver = 8;

  // The amount of time before the start of the previous backfill
  // to consider when running the backfill resolver. Set this parameter
  // to the be equal to the latest arriving data in the backfill window.
  optional google.protobuf.Duration backfill_lookback_duration = 9;

  // The time at which to start back filling the materialized aggregate.
  // If not provided, the backfill consider the earliest available data returned
  // by the `backfill_resolver`.
  optional google.protobuf.Timestamp backfill_start_time = 10;

  // The resolver to use for continuous updates to the materialized aggregate.
  // If not provided, the data will be updated using the resolver that would run
  // for an online query.
  optional string continuous_resolver = 11;

  // The period for which to use the continuous resolver, instead
  // of relying upon the last backfill. If not provided, and a continuous
  // resolver is provided, this will be set to backfill_lookback_duration.
  optional google.protobuf.Duration continuous_buffer_duration = 12;

  // A crontab or duration string to specify the schedule for back filling the
  // materialized aggregate.
  optional string backfill_schedule = 13;

  // The lower bound of the first bucket. All buckets are aligned to this time.
  google.protobuf.Timestamp bucket_start = 14;

  // The 'k' arg of approx_top_k.
  optional int64 approx_top_k_arg_k = 15;
}

message WindowInfo {
  google.protobuf.Duration duration = 1;
  optional WindowAggregation aggregation = 2;
}

enum CacheStrategy {
  CACHE_STRATEGY_UNSPECIFIED = 0;
  CACHE_STRATEGY_ALL = 1;
  CACHE_STRATEGY_NO_NULLS = 2;
  CACHE_STRATEGY_EVICT_NULLS = 3;
  CACHE_STRATEGY_NO_DEFAULTS = 4;
  CACHE_STRATEGY_EVICT_DEFAULTS = 5;
  CACHE_STRATEGY_NO_NULLS_OR_DEFAULTS = 6;
  CACHE_STRATEGY_EVICT_NULLS_AND_DEFAULTS = 7;
}

enum AcceleratePython {
  ACCELERATE_PYTHON_UNSPECIFIED = 0;
  ACCELERATE_PYTHON_REQUIRE = 1;
  ACCELERATE_PYTHON_AUTO = 2;
  ACCELERATE_PYTHON_NEVER = 3;
}

message FeatureInput {
  FeatureReference feature = 1;
  chalk.arrow.v1.ScalarValue default_value = 2;
}

message ResolverInput {
  oneof annotation {
    FeatureInput feature = 1;
    DataFrameType df = 2;
    ResolverState state = 3;
  }
}

message ResolverOutput {
  oneof annotation {
    FeatureReference feature = 1;
    DataFrameType df = 2;
  }
}

message Resolver {
  string fqn = 1;
  ResolverKind kind = 2;
  repeated ResolverInput inputs = 3;
  repeated ResolverOutput outputs = 4;
  bool is_generator = 5;
  // data_sources is deprecated; see data_sources_v2
  repeated DatabaseSourceReference data_sources = 6 [deprecated = true];
  optional string machine_type = 7;
  repeated string tags = 8;
  optional string owner = 9;
  // The docstring of the python function
  optional string doc = 10;
  repeated string environments = 11;
  google.protobuf.Duration timeout_duration = 12;
  Schedule schedule = 13;
  chalk.expression.v1.LogicalExprNode when = 14;
  CronFilterWithFeatureArgs cron_filter = 15;
  FunctionReference function = 16;
  ResourceHint resource_hint = 17;
  bool is_static = 18;
  AcceleratePython accelerate_python = 31;
  optional bool is_total = 19;
  repeated string unique_on = 20;
  repeated string partitioned_by = 21;
  repeated chalk.graph.v2.DatabaseSourceReference data_sources_v2 = 22;
  chalk.expression.v1.LogicalExprNode static_operation = 23;
  optional chalk.dataframe.v1.DataFramePlan static_operation_dataframe = 30;
  optional SQLResolverSettings sql_settings = 24;
  optional string resource_group = 25;
  optional string output_row_order = 26;
  optional string venv = 27;
  // Applied to the results of running a resolver. Currently only enabled for
  // SQL resolvers.
  oneof postprocessing {
    // Column projection to apply to the resolver outputs -- result should be a
    // struct or list<struct> that can be unpacked into a table w/ the same
    // schema as the original sql outputs
    chalk.expression.v1.LogicalExprNode underscore_expr = 28;
    // LazyFrame table operation to apply on the SQL outputs
    chalk.expression.v1.LogicalExprNode lazyframe_expr = 29;
  }
}

message SinkResolver {
  string fqn = 1;
  repeated ResolverInput inputs = 2;
  optional uint64 buffer_size = 3;
  google.protobuf.Duration debounce_duration = 4;
  google.protobuf.Duration max_delay_duration = 5;
  bool upsert = 6;
  oneof integration {
    // stream_source is deprecated; see stream_source_v2
    StreamSourceReference stream_source = 7 [deprecated = true];
    // database_source is deprecated; see database_source_v2
    DatabaseSourceReference database_source = 8 [deprecated = true];
    chalk.graph.v2.StreamSourceReference stream_source_v2 = 15;
    chalk.graph.v2.DatabaseSourceReference database_source_v2 = 16;
  }
  optional string machine_type = 9;
  optional string doc = 10;
  optional string owner = 11;
  repeated string environments = 12;
  google.protobuf.Duration timeout_duration = 13;
  FunctionReference function = 14;
}

message ParseInfo {
  FunctionReference parse_function = 1;
  chalk.arrow.v1.ArrowType parse_function_input_type = 2;
  chalk.arrow.v1.ArrowType parse_function_output_type = 3;
  bool is_parse_function_output_optional = 4;
  // These are the `__name__` of the type of the parameter/return annotations.
  string parse_function_input_type_name = 5;
  string parse_function_output_type_name = 6;
  oneof parse_expression {
    chalk.expression.v1.LogicalExprNode underscore_expr = 7;
  }
}

// Feature defined as a projection on some input table.
// In the future we may want to distinguish between underscore & ChalkDataFrame
// projection expr's, since they have the same proto representation but
// different semantics
message FeatureExpression {
  oneof expr {
    chalk.expression.v1.LogicalExprNode underscore_expr = 1;
    // chalk.expression.v1.LogicalExprNode dataframe_expr = 1;
  }
}
message StreamResolver {
  string fqn = 1;
  repeated StreamResolverParam params = 2;
  repeated ResolverOutput outputs = 3;
  chalk.arrow.v1.ArrowType explicit_schema = 4;
  repeated StreamKey keys = 5;
  StreamSourceReference source = 6 [deprecated = true];
  ParseInfo parse_info = 7;
  WindowMode mode = 8;
  repeated string environments = 9;
  google.protobuf.Duration timeout_duration = 10;
  optional string timestamp_attribute_name = 11;
  optional string owner = 12;
  optional string doc = 13;
  optional string machine_type = 14;
  FunctionReference function = 15;
  chalk.graph.v2.StreamSourceReference source_v2 = 16;
  bool updates_materialized_aggregations = 17;
  // Represents features computed as static projection expressions on an input
  // message.
  map<string, FeatureExpression> feature_expressions = 18;
  optional StreamResolverMessageProducerParsed message_producer = 19;
  // Skip online persistence (no writes to Redis/DynamoDB/etc). Default: false
  // Note: Only applies to native streaming (make_stream_resolver)
  bool skip_online = 20;
  // Skip offline persistence (no result bus publishing for offline storage). Default: false
  // Note: Only applies to native streaming (make_stream_resolver)
  bool skip_offline = 21;
}

message StreamResolverMessageProducerParsed {
  optional chalk.graph.v2.StreamSourceReference send_to = 1;
  repeated string output_features = 2;
  map<string, FeatureExpression> transformations = 3;
  string format = 4;
}

enum ResolverKind {
  RESOLVER_KIND_UNSPECIFIED = 0;
  RESOLVER_KIND_ONLINE = 1;
  RESOLVER_KIND_OFFLINE = 2;
}

enum ResourceHint {
  RESOURCE_HINT_UNSPECIFIED = 0;
  RESOURCE_HINT_CPU = 1;
  RESOURCE_HINT_IO = 2;
  RESOURCE_HINT_GPU = 3;
}

message ResolverState {
  chalk.arrow.v1.ScalarValue initial = 1;
  chalk.arrow.v1.ArrowType arrow_type = 2;
}

message StreamResolverParam {
  oneof type {
    StreamResolverParamMessage message = 1;
    StreamResolverParamMessageWindow message_window = 2;
    ResolverState state = 3;
  }
}

message StreamResolverParamMessageWindow {
  string name = 1;
  chalk.arrow.v1.ArrowType arrow_type = 2;
}

message StreamResolverParamMessage {
  string name = 1;
  chalk.arrow.v1.ArrowType arrow_type = 2;
  // If the message type is a struct, this specifies the struct definition.
  // (e.g. basemodel/dataclass/protobuf)
  oneof struct_type {
    google.protobuf.Empty empty = 3;
    FunctionGlobalCapturedStruct struct = 4;
    FunctionGlobalCapturedProto proto = 5;
  }
}

message FunctionReference {
  string name = 1;
  string module = 2;
  string file_name = 3;
  string function_definition = 4;
  optional int32 source_line = 5;
  repeated FunctionReferenceCapturedGlobal captured_globals = 6;
}

message FunctionReferenceCapturedGlobal {
  string global_name = 3;
  oneof captured_global {
    FunctionGlobalCapturedBuiltin builtin = 1;
    FunctionGlobalCapturedFeatureClass feature_class = 2;
    FunctionGlobalCapturedEnum enum = 4;
    FunctionGlobalCapturedModule module = 5;
    FunctionGlobalCapturedModuleMember module_member = 7;
    FunctionGlobalCapturedFunction function = 6;
    FunctionGlobalCapturedStruct struct = 8;
    FunctionGlobalCapturedVariable variable = 10;
    FunctionGlobalCapturedProto proto = 11;
  }
  optional SourceFileReference source_reference = 9;
}

message FunctionGlobalCapturedBuiltin {
  string builtin_name = 1;
}

message FunctionGlobalCapturedVariable {
  string module = 1;
  string name = 2;
}

message FunctionGlobalCapturedStruct {
  string module = 1;
  string name = 2;
  chalk.arrow.v1.ArrowType pa_dtype = 3;
}

message FunctionGlobalCapturedEnum {
  string module = 1;
  string name = 2;
  map<string, chalk.arrow.v1.ScalarValue> member_map = 3;
  repeated chalk.arrow.v1.ArrowType bases = 4;
}

message FunctionGlobalCapturedFeatureClass {
  string feature_class_name = 1;
}

message FunctionGlobalCapturedModule {
  string name = 1;
}

message FunctionGlobalCapturedModuleMember {
  // Imported classes/functions, e.g. json.encoder.JSONEncoder
  string module_name = 1; // name of the module, e.g. `json.encoder`
  string qualname = 2; // name of the class or function, e.g. `JSONEncoder``.
  // Not present for modules.
}

message FunctionGlobalCapturedFunction {
  string source = 1;
  repeated FunctionReferenceCapturedGlobal captured_globals = 2;
  optional string module = 3;
  string name = 4;
}

message FunctionGlobalCapturedProto {
  string module = 1;
  string name = 2;
  bytes fd = 3 [deprecated = true];
  bytes serialized_fd = 6;
  chalk.arrow.v1.ArrowType pa_dtype = 4;
  string full_name = 5;
}

message SourceFileReference {
  lsp.v1.Range range = 1;
  optional string code = 2;
  string file_name = 3;
}

message StreamKey {
  string key = 1;
  FeatureReference feature = 2;
}

message SQLResolverSettings {
  Finalizer finalizer = 1;
  optional IncrementalSettings incremental_settings = 2;
  map<string, string> fields_root_fqn = 3;
  map<string, string> escaped_param_name_to_fqn = 4;
}

enum Finalizer {
  FINALIZER_UNSPECIFIED = 0;
  FINALIZER_ONE_OR_NONE = 1;
  FINALIZER_ONE = 2;
  FINALIZER_FIRST = 3;
  FINALIZER_ALL = 4;
}

message IncrementalSettings {
  IncrementalMode mode = 1;
  optional google.protobuf.Duration lookback_period = 2;
  optional string incremental_column = 3;
  IncrementalTimestampMode timestamp_mode = 4;
}

enum IncrementalMode {
  INCREMENTAL_MODE_UNSPECIFIED = 0;
  INCREMENTAL_MODE_ROW = 1;
  INCREMENTAL_MODE_GROUP = 2;
  INCREMENTAL_MODE_PARAMETER = 3;
}

enum IncrementalTimestampMode {
  INCREMENTAL_TIMESTAMP_MODE_UNSPECIFIED = 0;
  INCREMENTAL_TIMESTAMP_MODE_FEATURE_TIME = 1;
  INCREMENTAL_TIMESTAMP_MODE_RESOLVER_EXECUTION_TIME = 2;
}

message SQLResolverCommentDict {
  optional bool total = 1;
  optional string source = 2;
  optional string resolves = 3;
  optional string namespace = 4;
  optional IncrementalSettings incremental = 5;
  repeated string tags = 6;
  repeated string environment = 7;
  optional Finalizer count = 8;
  optional Schedule cron = 9;
  optional string machine_type = 10;
  optional string owner = 11;
  optional string type = 12;
  optional string timeout = 13;
  map<string, string> fields = 14;
  repeated string unique_on = 15;
  repeated string partitioned_by = 16;
}

message SQLResolverInfo {
  // Resolver name
  string name = 1;
  // Filepath of the resolver, or None if it doesn't come from a file in the
  // deployment.
  optional string filepath = 2;
  // Source of the SQL query
  string sql_string = 3;
  // This overrides any comments present in the sql string itself (e.g. `--
  // tags: a,b,...`)
  optional SQLResolverCommentDict override_comment_dict = 4;
}

enum WindowMode {
  WINDOW_MODE_UNSPECIFIED = 0;
  WINDOW_MODE_CONTINUOUS = 1;
  WINDOW_MODE_TUMBLING = 2;
  WINDOW_MODE_CDC = 3;
}

message CronFilterWithFeatureArgs {
  FunctionReference filter = 1;
  repeated FeatureReference args = 2;
}

message Schedule {
  oneof schedule {
    string crontab = 1;
    google.protobuf.Duration duration = 2;
  }
  FunctionReference filter = 3;
  FunctionReference sample = 4;
}

message FeatureValidation {
  oneof validation {
    // Deprecated since they don't store the full type information (e.g.
    // different numeric types) Use the *_arrow fields (6-9) instead.
    float min = 1 [deprecated = true];
    float max = 2 [deprecated = true];
    uint32 min_length = 3 [deprecated = true];
    uint32 max_length = 4 [deprecated = true];
    chalk.arrow.v1.ScalarValue min_arrow = 6;
    chalk.arrow.v1.ScalarValue max_arrow = 7;
    chalk.arrow.v1.ScalarValue min_length_arrow = 8;
    chalk.arrow.v1.ScalarValue max_length_arrow = 9;
    chalk.arrow.v1.ScalarValue contains = 10;
  }
  bool strict = 5;
}

message VersionInfo {
  uint32 default = 1;
  uint32 maximum = 2;
}

message StrictValidation {
  FeatureReference feature = 1;
  repeated FeatureValidation validations = 2;
}

message FeatureEncoder {
  oneof encoder {
    FunctionGlobalCapturedFunction global_function_reference = 1;
  }
}
message FeatureDecoder {
  oneof decoder {
    FunctionGlobalCapturedFunction global_function_reference = 1;
  }
}

// Represents a generic typ annotation, e.g. Dict[str,
// List[Optional[SomeClass]]] etc.
message RichClassType {
  string module_name = 1;
  string qualname = 2;
  // The type parameters inside the []
  repeated RichClassType params = 3;
}

message FeatureRichType {
  oneof type {
    RichClassType class_type = 1;
  }
}

message FeatureRichTypeInfo {
  bool rich_type_is_same_as_primitive_type = 1;
  optional FeatureEncoder encoder = 2;
  optional FeatureDecoder decoder = 3;
  optional FeatureRichType rich_type = 4;
  optional string rich_type_name = 5;
}

// Configuration for LRU cache in front of the online store
message LRUCacheConfig {
  uint32 max_size = 1;
  google.protobuf.Duration ttl = 2;
  bool store_cache_misses = 3;
}

// Configuration for online store with optional LRU cache
message OnlineStoreConfig {
  string name = 1;
  optional LRUCacheConfig lru_cache = 2;
  repeated string feature_namespaces = 3;
  optional SourceFileReference source_file_reference = 4;
}
